groups:
- name: management-resources
  rules:
  - alert: ManagementHighCPUUsage
    expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle", node_type="management"}[5m])) * 100) > 80
    for: 10m
    labels:
      severity: warning
      node_type: management
    annotations:
      summary: "Management node {{ $labels.instance }} high CPU usage"
      description: "Management node {{ $labels.instance }} CPU usage exceeds 80% for 10 minutes"
      alert_type: "node-cpu"

  - alert: ManagementHighMemoryUsage
    expr: (node_memory_MemTotal_bytes{node_type="management"} - node_memory_MemAvailable_bytes{node_type="management"}) / node_memory_MemTotal_bytes{node_type="management"} * 100 > 80
    for: 10m
    labels:
      severity: warning
      node_type: management
    annotations:
      summary: "Management node {{ $labels.instance }} high memory usage"
      description: "Management node {{ $labels.instance }} memory usage exceeds 80% for 10 minutes"
      alert_type: "node-memory"

  - alert: LowDiskSpace
    expr: (node_filesystem_avail_bytes{fstype=~"ext4|xfs", node_type="management"} / node_filesystem_size_bytes{fstype=~"ext4|xfs", node_type="management"} * 100) < 20
    for: 10m
    labels:
      severity: warning
      node_type: management
    annotations:
      summary: "Management node {{ $labels.instance }} low disk space"
      description: "Management node {{ $labels.instance }} disk space remaining less than 20% for 10 minutes"
      alert_type: "node-disk"

  - alert: ManagementHighNetworkTraffic
    expr: rate(node_network_receive_bytes_total{device!~"lo|bond.*|vnet.*|virbr.*|docker.*", node_type="management"}[1m]) * 8 / 1024 / 1024 / 1024 > 5 or
          rate(node_network_transmit_bytes_total{device!~"lo|bond.*|vnet.*|virbr.*|docker.*", node_type="management"}[1m]) * 8 / 1024 / 1024 / 1024 > 5
    for: 5m
    labels:
      severity: warning
      node_type: management
    annotations:
      summary: "Management node {{ $labels.instance }} high network traffic"
      description: "Management node {{ $labels.instance }} network receive/transmit rate exceeds 5GBbps for 5 minutes"
      alert_type: "node-network"