- name: Set Docker version
  set_fact:
    docker_version: "5:20.10.17~3-0~ubuntu-focal"

- name: Set scrape interval variable
  set_fact:
    scrape_interval: 15  # 15 seconds

- name: Set prometheus_server_ip from monitor group
  set_fact:
    prometheus_server_ip: "{{ hostvars[groups['monitor'][0]]['ansible_host'] }}"

- name: Gather IP addresses from hyper group
  set_fact:
    hyper_ips: "{{ groups['hyper'] | map('extract', hostvars, 'ansible_host') | list }}"

- name: Validate WDS configuration
  fail:
    msg: "wds_address must be configured with a valid value when wds group exists"
  when:
    - "'wds' in groups"
    - "wds_address | default('') | length == 0 or wds_admin | default('') | length == 0 or wds_pass | default('') | length == 0"

- name: Extract WDS monitor server credentials
  set_fact:
    wds_monitor_server_ip: "{{ wds_address | regex_replace('^(?:https?://)?([0-9.]+)(?:.*)$', '\\1') }}"
    wds_monitor_server_admin: "{{ wds_admin }}"
    wds_monitor_server_pass: "{{ wds_pass }}"
  when:
    - "'wds' in groups"
    - "wds_address is defined and wds_address | length > 0"
    - "wds_admin is defined and wds_admin | length > 0"
    - "wds_pass is defined and wds_pass | length > 0"

- name: Generate node exporters config block
  set_fact:
    node_exporters_block: |
      - job_name: 'prometheus_node_exporter'
        static_configs:
          {% for ip in hyper_ips -%}
          - targets: ['{{ ip }}:9100']
          {% endfor %}

- name: Generate libvirt exporters config block
  set_fact:
    libvirt_exporters_block: |
      - job_name: 'prometheus_libvirt_exporter'
        static_configs:
          {% for ip in hyper_ips -%}
          - targets: ['{{ ip }}:9177']
          {% endfor %}

- name: Validate Alertmanager variables
  fail:
    msg: "Must define {{ item }} for task"
  when: vars[item] | default('') | length == 0
  with_items:
    - smtp_host
    - alert_sender
    - smtp_user
    - smtp_pass
    - receiver_name
    - alert_recipient
  tags: [monitor]

- name: Install packages for monitor server
  delegate_to: "{{ prometheus_server_ip }}"
  become: true
  apt:
    name: 
      - prometheus
      - prometheus-node-exporter
    state: present
  tags: [monitor]

- name: Create Alertmanager system directories
  delegate_to: "{{ prometheus_server_ip }}"
  become: true
  file:
    path: "{{ item }}"
    state: directory
    owner: 65534
    group: 65534
  with_items:
    - /etc/alertmanager
    - /var/lib/alertmanager
  tags: [monitor]

- name: Create prometheus data directory with nobody owner
  delegate_to: "{{ prometheus_server_ip }}"
  become: true
  file:
    path: /var/lib/prometheus/data
    state: directory
    owner: prometheus
    group: prometheus
    mode: 0755

- name: Setup Alertmanager with Docker
  delegate_to: "{{ prometheus_server_ip }}"
  become: true
  block:
    - name: Install Docker prerequisites
      apt:
        name: 
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
        state: present

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        id: "0EBFCD88"

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker CE
      apt:
        name: docker-ce
        state: present
        update_cache: yes

    - name: Ensure Docker is running
      systemd:
        name: docker
        enabled: yes
        state: started

    - name: Create alertmanager directories
      file:
        path: "{{ item }}"
        state: directory
        owner: 65534
        group: 65534
        mode: 0775
      with_items:
        - /etc/alertmanager
        - /var/lib/alertmanager

    - name: Pull Alertmanager image
      docker_image:
        name: quay.io/prometheus/alertmanager
        tag: v0.26.0

    - name: Configure Alertmanager
      delegate_to: "{{ prometheus_server_ip }}"
      become: true
      copy:
        dest: /etc/alertmanager/alertmanager.yml
        content: |
          global:
            smtp_smarthost: '{{ smtp_host }}:587'
            smtp_from: '{{ alert_sender }}'
            smtp_auth_username: '{{ smtp_user }}'
            smtp_auth_password: '{{ smtp_pass }}'
            smtp_require_tls: true
          route:
            group_by: ['alertname']
            group_wait: 30s
            group_interval: 5m
            repeat_interval: 3h
            receiver: '{{ receiver_name }}'
          receivers:
          - name: '{{ receiver_name }}'
            email_configs:
            - to: '{{ alert_recipient }}'
              send_resolved: true
        owner: prometheus
        group: prometheus
        mode: 0644
      tags: [monitor]
    
    - name: Setup Alertmanager with Docker
      delegate_to: "{{ prometheus_server_ip }}"
      become: true
      block:
        - name: Run Alertmanager container
          docker_container:
            name: alertmanager
            image: quay.io/prometheus/alertmanager:v0.26.0
            state: started
            restart_policy: unless-stopped
            volumes:
              - /etc/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
              - /var/lib/alertmanager:/data
              - /etc/localtime:/etc/localtime:ro
            ports:
              - "9093:9093"
            command: 
              - "--config.file=/etc/alertmanager/alertmanager.yml"
              - "--storage.path=/data"
              - "--data.retention=720h"
              - "--log.level=debug"
            user: "65534:65534"
      tags: [monitor]

- name: Verify Alertmanager running status
  delegate_to: "{{ prometheus_server_ip }}"
  become: true
  uri:
    url: http://localhost:9093/-/healthy
    method: GET
    status_code: 200
    timeout: 5
  register: alertmanager_health
  until: alertmanager_health.status == 200
  retries: 6
  delay: 10
  tags: [monitor]

- name: Configure Prometheus server
  delegate_to: "{{ prometheus_server_ip }}"
  become: true
  copy:
    content: |
      global:
        scrape_interval: {{ scrape_interval }}s
        evaluation_interval: 15s

      rule_files:
        - /etc/prometheus/rules_enabled/*.yml

      scrape_configs:
        - job_name: 'prometheus'
          static_configs:
            - targets: ['localhost:9090']
    dest: /etc/prometheus/prometheus.yml
    owner: prometheus
    group: prometheus
  tags: [monitor]

- name: Create alert rules directory structure
  delegate_to: "{{ prometheus_server_ip }}"
  become: true
  file:
    path: "{{ item }}"
    state: directory
    owner: prometheus
    group: prometheus
    mode: 0755
  with_items:
    - /etc/prometheus/rules_enabled
    - /etc/prometheus/general_rules
    - /etc/prometheus/special_rules
    - /var/log/prometheus
  tags: [monitor]

- name: Ensure rule_files declaration exists
  delegate_to: "{{ prometheus_server_ip }}"
  become: true
  lineinfile:
    path: /etc/prometheus/prometheus.yml
    insertafter: '^global:'
    line: 'rule_files:'
    backup: yes
  tags: [monitor]

- name: Update Prometheus config to load enabled rules
  delegate_to: "{{ prometheus_server_ip }}"
  become: true
  lineinfile:
    path: /etc/prometheus/prometheus.yml
    insertafter: '^rule_files:'
    line: '  - /etc/prometheus/rules_enabled/*.yml'
    backup: yes
  tags: [monitor]

- name: Ensure rule_files declaration exists
  delegate_to: "{{ prometheus_server_ip }}"
  become: true
  lineinfile:
    path: /etc/prometheus/prometheus.yml
    insertafter: '^global:'
    line: 'rule_files:'
    backup: yes
  tags: [monitor]

- name: Update Prometheus with node exporters block
  delegate_to: "{{ prometheus_server_ip }}"
  become: true
  blockinfile:
    path: /etc/prometheus/prometheus.yml
    block: |
      {{ node_exporters_block | indent(2, True) }}
    marker: "# {mark} ANSIBLE MANAGED BLOCK - Node Exporters"
    insertafter: '^scrape_configs:'
    create: yes
  tags: [monitor]

- name: Update Prometheus with libvirt exporters block
  delegate_to: "{{ prometheus_server_ip }}"
  become: true
  blockinfile:
    path: /etc/prometheus/prometheus.yml
    block: |
      {{ libvirt_exporters_block | indent(2, True) }}
    marker: "# {mark} ANSIBLE MANAGED BLOCK - Libvirt Exporters"
    insertafter: '^scrape_configs:'
    create: yes
  tags: [monitor]

- name: Create systemd override directory for Prometheus
  delegate_to: "{{ prometheus_server_ip }}"
  become: true
  file:
    path: /etc/systemd/system/prometheus.service.d
    state: directory
    owner: root
    group: root
    mode: 0755
  tags: [monitor]

- name: Add Prometheus service overrides
  delegate_to: "{{ prometheus_server_ip }}"
  become: true
  copy:
    dest: /etc/systemd/system/prometheus.service.d/override.conf
    content: |
      [Service]
      ExecStart=
      ExecStart=/usr/bin/prometheus \
        --config.file=/etc/prometheus/prometheus.yml \
        --storage.tsdb.retention.time=720h \
        --storage.tsdb.path=/var/lib/prometheus/data \
        --log.level=info \
        --log.format=json
    mode: 0644
  tags: [monitor]

- name: Force reload systemd after config change
  delegate_to: "{{ prometheus_server_ip }}"
  become: true
  systemd:
    daemon_reload: yes
  tags: [monitor]

- name: reload prometheus systemd
  delegate_to: "{{ prometheus_server_ip }}"
  become: true
  systemd:
    daemon_reload: yes
  tags: [monitor]

- name: Start Prometheus services on Prometheus server
  delegate_to: "{{ prometheus_server_ip }}"
  become: true
  systemd:
    name: "{{ item }}"
    enabled: yes
    daemon_reload: yes
    state: restarted
  loop:
    - 'prometheus-node-exporter'
    - 'prometheus'
  tags: [monitor]

- name: Add Grafana GPG key
  delegate_to: "{{ prometheus_server_ip }}"
  become: true
  apt_key:
    url: https://packages.grafana.com/gpg.key
    state: present
  tags: [monitor]

- name: Add Grafana repository
  delegate_to: "{{ prometheus_server_ip }}"
  become: true
  apt_repository:
    repo: deb https://packages.grafana.com/oss/deb stable main
    state: present
  tags: [monitor]

- name: Update apt cache and install Grafana
  delegate_to: "{{ prometheus_server_ip }}"
  become: true
  apt:
    update_cache: true
    name: grafana
    state: present
  tags: [monitor]

- name: Configure Grafana
  delegate_to: "{{ prometheus_server_ip }}"
  become: true
  copy:
    dest: /etc/grafana/grafana.ini
    content: |
      [server]
      http_port = 3000
      [database]
      type = sqlite3
      path = /var/lib/grafana/grafana.db

- name: Start and enable Grafana service
  delegate_to: "{{ prometheus_server_ip }}"
  become: true
  systemd:
    name: grafana-server
    state: started
    enabled: true
  tags: [monitor]

- name: Wait for Grafana to be ready
  delegate_to: "{{ prometheus_server_ip }}"
  become: true
  uri:
    url: http://localhost:3000/api/health
    method: GET
    status_code: 200
    timeout: 10
  register: grafana_health
  until: grafana_health.status == 200
  retries: 10
  delay: 5
  tags: [monitor]

- name: Add Prometheus as Grafana data source
  delegate_to: "{{ prometheus_server_ip }}"
  become: true
  uri:
    url: http://localhost:3000/api/datasources
    method: POST
    body:
      name: "Prometheus"
      type: "prometheus"
      url: "http://{{ prometheus_server_ip }}:9090"  
      access: "proxy"
      isDefault: true
    body_format: json
    status_code: 200
    headers:
      Content-Type: "application/json"
    user: admin
    password: admin
    force_basic_auth: yes
  ignore_errors: true
  changed_when: false
  tags: [monitor]

- name: Add monitor section to config.toml
  delegate_to: "{{ prometheus_server_ip }}"
  become: true
  blockinfile:
    path: /opt/cloudland/web/conf/config.toml
    block: |
      [monitor]
      host = "{{ prometheus_server_ip }}"
      port = 9090
    create: yes
  tags: [monitor]

- name: Add WDS monitor section to config.toml
  delegate_to: "{{ prometheus_server_ip }}"
  become: true
  blockinfile:
    path: /opt/cloudland/web/conf/config.toml
    block: |
      [WDS]
      host = "{{ wds_monitor_server_ip }}"
      port = 9090
      admin = "{{ wds_monitor_server_admin }}"
      password = "{{ wds_monitor_server_pass }}"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - WDS"
    create: yes
  when:
    - "'wds' in groups"
    - "wds_address is defined"
  tags: [monitor]
